{% extends "base.html" %}

{% block title %}Tirada y Combate - RPG Platform{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-10 mx-auto">
            <div class="card shadow-lg">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">🎲⚔️ Nueva Tirada y Combate</h3>
                </div>
                
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <!-- Seleccionar Combate -->
                        <div class="mb-4">
                            <label for="id_combate" class="form-label"><strong>Selecciona un Combate</strong></label>
                            <select name="id_combate" id="id_combate" class="form-select form-select-lg" required>
                                <option value="">-- Selecciona un combate --</option>
                                {% for combate in combates %}
                                    <option value="{{ combate.id_combate }}">
                                        Combate #{{ combate.id_combate }} - {{ combate.id_campania.nombre }} ({{ combate.estado }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row">
                            <!-- Seleccionar Dado -->
                            <div class="col-md-6">
                                <div class="mb-4">
                                    <label for="id_dado" class="form-label"><strong>🎲 Selecciona el Dado</strong></label>
                                    <div class="btn-group-vertical w-100" role="group">
                                        <input type="radio" class="btn-check" name="tipo_dado" id="d4" value="d4" required>
                                        <label class="btn btn-outline-primary" for="d4">d4 (1-4)</label>

                                        <input type="radio" class="btn-check" name="tipo_dado" id="d6" value="d6">
                                        <label class="btn btn-outline-primary" for="d6">d6 (1-6)</label>

                                        <input type="radio" class="btn-check" name="tipo_dado" id="d8" value="d8">
                                        <label class="btn btn-outline-primary" for="d8">d8 (1-8)</label>

                                        <input type="radio" class="btn-check" name="tipo_dado" id="d10" value="d10">
                                        <label class="btn btn-outline-primary" for="d10">d10 (1-10)</label>

                                        <input type="radio" class="btn-check" name="tipo_dado" id="d12" value="d12">
                                        <label class="btn btn-outline-primary" for="d12">d12 (1-12)</label>

                                        <input type="radio" class="btn-check" name="tipo_dado" id="d20" value="d20">
                                        <label class="btn btn-outline-primary" for="d20">d20 (1-20) <strong>Clásico</strong></label>
                                    </div>
                                </div>
                            </div>

                            <!-- Seleccionar Acción -->
                            <div class="col-md-6">
                                <div class="mb-4">
                                    <label for="id_accion" class="form-label"><strong>⚔️ Selecciona la Acción</strong></label>
                                    <div class="btn-group-vertical w-100" role="group">
                                        <input type="radio" class="btn-check" name="tipo_accion" id="ataque" value="ataque" required>
                                        <label class="btn btn-outline-danger" for="ataque">🗡️ Ataque</label>

                                        <input type="radio" class="btn-check" name="tipo_accion" id="esquivar" value="esquivar">
                                        <label class="btn btn-outline-warning" for="esquivar">🏃 Esquivar</label>

                                        <input type="radio" class="btn-check" name="tipo_accion" id="proteger" value="proteger">
                                        <label class="btn btn-outline-info" for="proteger">🛡️ Proteger</label>

                                        <input type="radio" class="btn-check" name="tipo_accion" id="encantar" value="encantar">
                                        <label class="btn btn-outline-purple" for="encantar">✨ Encantar</label>

                                        <input type="radio" class="btn-check" name="tipo_accion" id="sanar" value="sanar">
                                        <label class="btn btn-outline-success" for="sanar">💚 Sanar</label>

                                        <input type="radio" class="btn-check" name="tipo_accion" id="habilidad_especial" value="habilidad_especial">
                                        <label class="btn btn-outline-secondary" for="habilidad_especial">⭐ Habilidad Especial</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Descripción -->
                        <div class="mb-4">
                            <label for="descripcion" class="form-label"><strong>📝 Descripción (Opcional)</strong></label>
                            <textarea name="descripcion" id="descripcion" class="form-control" rows="3" placeholder="Describe qué hace tu personaje..."></textarea>
                        </div>

                        <!-- Botones -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-5">
                            <a href="{% url 'home' %}" class="btn btn-secondary btn-lg">← Cancelar</a>
                            <button type="submit" class="btn btn-success btn-lg">
                                🎲 Lanzar Dado y Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Historial de Tiradas Recientes -->
            <div class="card mt-4">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0">📋 Mis Tiradas Recientes</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted">Accede a <a href="{% url 'tirada:list' %}">Tiradas de Dado</a> para ver tu historial completo.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-outline-purple {
        color: #7c3aed;
        border-color: #7c3aed;
    }
    
    .btn-outline-purple:hover {
        background-color: #7c3aed;
        color: white;
    }
    
    .btn-group-vertical .btn-check:checked + label {
        font-weight: bold;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
</style>
{% endblock %}
